kind = "web"
previewPath = "/"
title = "Blessing Digital"
version = "1.0.0"
id = "artifacts/blessing-digital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22795

[services.development]
run = "pnpm --filter @workspace/blessing-digital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blessing-digital", "run", "build" ]
publicDir = "artifacts/blessing-digital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22795"
BASE_PATH = "/"
